workflows:
  ios-workflow:
    name: SwiftDeal iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies
        script: |
          cd "SwiftDeal IOS/src"
          pod install
      - name: Build and Sign the iOS App
        script: |
          cd "SwiftDeal IOS/src"
          xcode-project build-ipa --workspace "SwiftDeal.xcworkspace" --scheme "SwiftDeal"
    artifacts:
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
