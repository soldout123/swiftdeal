workflows:
  ios-workflow:
    name: SwiftDeal iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
    groups: - signing
      xcode: latest
      cocoapods: default
    scripts:
      - name: Setup and Build
        script: |
          app-store-connect fetch-signing-files "com.swiftdeal.app" --type IOS_APP_STORE --create
          xcode-project use-profiles
          cd "SwiftDeal IOS/src"
          pod install
          cd ../..
          xcode-project build-ipa --workspace "SwiftDeal IOS/src/SwiftDeal.xcworkspace" --scheme "SwiftDeal"
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
