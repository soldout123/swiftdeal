workflows:
  ios-workflow:
    name: SwiftDeal iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Setup and Build
        script: |
          # Generate a fresh private key for Apple certificate
          openssl genrsa -out /tmp/cert_key.pem 2048
          export CERTIFICATE_PRIVATE_KEY="$(cat /tmp/cert_key.pem)"
          
          # Create certificate and provisioning profile on Apple
          app-store-connect fetch-signing-files "com.swiftdeal.app" \
            --type IOS_APP_STORE \
            --create
          
          # Apply signing to Xcode project
          xcode-project use-profiles
          
          # Install CocoaPods
          cd "SwiftDeal IOS/src"
          pod install
          cd ../..
          
          # Build the IPA
          xcode-project build-ipa \
            --workspace "SwiftDeal IOS/src/SwiftDeal.xcworkspace" \
            --scheme "SwiftDeal"
    artifacts:
      - build/ios/ipa/*.ipa
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
