workflows:
  ios-workflow:
    name: SwiftDeal iOS Build
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: Codemagic
    environment:
      xcode: latest
      cocoapods: default
    scripts:
      - name: Install Dependencies
        script: |
          cd "SwiftDeal IOS/src"
          pod install
      - name: Download Apple Certificates
        script: |
          cd "SwiftDeal IOS/src"
          keychain initialize
          
          # 1. Force delete any hidden, old profiles on the virtual Mac
          rm -rf ~/Library/MobileDevice/Provisioning\ Profiles/*
          
          # 2. Hardcode the Bundle ID so it cannot possibly pull the wrong one
          app-store-connect fetch-signing-files "com.swiftdeal.app" --type IOS_APP_STORE --create
          
          keychain add-certificates
          xcode-project use-profiles
      - name: Build the iOS App
        script: |
          cd "SwiftDeal IOS/src"
          xcode-project build-ipa --workspace "SwiftDeal.xcworkspace" --scheme "SwiftDeal"
    artifacts:
      - "**/*.ipa"
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
