<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDeal - Name Your Price Ride</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; background-color: #f8f9fa; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: #000; color: #fff; padding: 20px; text-align: center; }
        .header h1 { margin: 0; font-size: 24px; color: #f9d71c; } /* Yellow/Black SwiftDeal theme */
        
        #map { width: 100%; height: 300px; background: #ddd; }
        
        .form-section { padding: 20px; flex-grow: 1; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; font-size: 14px; }
        input { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .price-input { font-size: 20px; font-weight: bold; text-align: center; border: 2px solid #25D366; }
        
        .btn-send { background-color: #25D366; color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px; }
        .btn-send:hover { background-color: #128C7E; }
        .footer-note { font-size: 12px; color: #888; text-align: center; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>SwiftDeal 🚕</h1>
        <p style="margin:5px 0 0 0;">Negotiate in seconds, ride in minutes.</p>
    </div>

    <div id="map"></div>

    <div class="form-section">
        <div class="input-group">
            <label>📍 Pickup Location (Drag pin or type)</label>
            <input type="text" id="pickup" placeholder="Enter pickup address">
        </div>

        <div class="input-group">
            <label>🏁 Destination</label>
            <input type="text" id="destination" placeholder="Where are you going?">
        </div>

        <div class="input-group">
            <label>💰 Your Offer (USD/JMD)</label>
            <input type="number" id="offer" class="price-input" placeholder="0.00">
        </div>

        <button class="btn-send" onclick="sendToWhatsApp()">SEND OFFER TO DRIVERS</button>
        
        <p class="footer-note">Your request will open in WhatsApp to chat with drivers.</p>
    </div>
</div>

<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&libraries=places&callback=initApp" async defer></script>

<script>
    let map, marker, autocompletePickup, autocompleteDest, geocoder;

    function initApp() {
        const defaultLocation = { lat: 18.0179, lng: -76.8099 }; // Default to Kingston, Jamaica
        
        // Initialize Map
        map = new google.maps.Map(document.getElementById("map"), {
            center: defaultLocation,
            zoom: 14,
            mapTypeControl: false
        });

        // Initialize Marker
        marker = new google.maps.Marker({
            position: defaultLocation,
            map: map,
            draggable: true,
            title: "Drag to Pickup"
        });

        geocoder = new google.maps.Geocoder();

        // Autocomplete for inputs
        autocompletePickup = new google.maps.places.Autocomplete(document.getElementById('pickup'));
        autocompleteDest = new google.maps.places.Autocomplete(document.getElementById('destination'));

        // When pin is dragged, update pickup text
        marker.addListener("dragend", () => {
            const pos = marker.getPosition();
            reverseGeocode(pos);
        });

        // When address is typed, move the pin
        autocompletePickup.addListener("place_changed", () => {
            const place = autocompletePickup.getPlace();
            if (place.geometry) {
                map.setCenter(place.geometry.location);
                marker.setPosition(place.geometry.location);
            }
        });
    }

    function reverseGeocode(latlng) {
        geocoder.geocode({ location: latlng }, (results, status) => {
            if (status === "OK" && results[0]) {
                document.getElementById('pickup').value = results[0].formatted_address;
            }
        });
    }

    function sendToWhatsApp() {
        const pickup = document.getElementById('pickup').value;
        const destination = document.getElementById('destination').value;
        const offer = document.getElementById('offer').value;
        const lat = marker.getPosition().lat();
        const lng = marker.getPosition().lng();

        if (!pickup || !destination || !offer) {
            alert("Please fill in all details!");
            return;
        }

        // Create the Google Maps link for the driver
        const mapLink = `https://www.google.com/maps?q=${lat},${lng}`;

        // Create the WhatsApp message
        const text = `*New SwiftDeal Request!*%0A%0A` +
                     `📍 *Pickup:* ${pickup}%0A` +
                     `🏁 *Destination:* ${destination}%0A` +
                     `💰 *My Offer:* $${offer}%0A%0A` +
                     `📍 *Live Pickup Pin:* ${mapLink}%0A%0A` +
                     `_Please reply with YES or your counter offer!_`;

        const whatsappUrl = `https://wa.me/18763351489?text=${text}`;
        
        window.open(whatsappUrl, '_blank');
    }
</script>

</body>
</html>
