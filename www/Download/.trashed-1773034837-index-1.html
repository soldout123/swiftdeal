<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>SwiftDeal - Global Ride Sharing</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { --primary: #f9d71c; --dark: #000; --dark-light: #1a1a1a; --success: #28a745; --danger: #dc3545; --info: #17a2b8; --gray: #888; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; margin: 0; padding: 0; background: #f5f5f5; -webkit-font-smoothing: antialiased; }
        .container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh; display: flex; flex-direction: column; }
        
        /* Header */
        .header { background: var(--dark); color: #fff; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header h1 { margin: 0; font-size: 18px; color: var(--primary); }
        .header-btn { background: none; border: none; color: var(--primary); font-size: 24px; cursor: pointer; padding: 5px; }
        
        /* Online Drivers Badge */
        .online-drivers-badge {
            background: linear-gradient(135deg, #28a745, #20c997);
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .online-drivers-badge .dot {
            width: 6px; height: 6px;
            background: white;
            border-radius: 50%;
            animation: blink 1s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        
        /* Map */
        .map-container { position: relative; width: 100%; height: 220px; }
        #map { width: 100%; height: 100%; background: #e0e0e0; }
        .map-btn { position: absolute; bottom: 12px; right: 12px; background: white; width: 40px; height: 40px; border-radius: 50%; box-shadow: 0 2px 8px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; font-size: 18px; cursor: pointer; border: none; z-index: 10; }
        .drivers-nearby-badge {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.8); color: white;
            padding: 6px 12px; border-radius: 20px; font-size: 11px;
            z-index: 10;
        }
        .drivers-nearby-badge span { color: var(--primary); font-weight: bold; }
        
        /* Currency Badge */
        .currency-badge {
            position: absolute; top: 12px; right: 12px;
            background: rgba(249, 215, 28, 0.95); color: #000;
            padding: 6px 12px; border-radius: 20px; font-size: 11px;
            font-weight: 600;
            z-index: 10;
        }
        
        /* Form */
        .form-section { padding: 15px; flex-grow: 1; overflow-y: auto; }
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #333; font-size: 13px; }
        .input-group input, .input-group select, .input-group textarea { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 15px; background: #fafafa; }
        .input-group input:focus { outline: none; border-color: var(--primary); }
        
        /* Location Input with Button */
        .location-input-wrapper { position: relative; display: flex; gap: 8px; }
        .location-input-wrapper input { flex: 1; }
        .use-location-btn {
            background: var(--primary); border: none; border-radius: 10px;
            padding: 12px 14px; cursor: pointer; font-size: 16px;
            display: flex; align-items: center; justify-content: center;
            min-width: 48px; transition: all 0.2s;
        }
        .use-location-btn:hover { background: #e6c419; }
        .use-location-btn:disabled { background: #ccc; cursor: not-allowed; }
        .use-location-btn.loading { animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* Passenger Count Selector */
        .passenger-selector { display: flex; align-items: center; gap: 15px; background: #f8f8f8; padding: 12px 15px; border-radius: 10px; border: 1px solid #ddd; }
        .passenger-selector .label { font-weight: 600; font-size: 14px; color: #333; }
        .passenger-counter { display: flex; align-items: center; gap: 12px; margin-left: auto; }
        .passenger-counter button {
            width: 36px; height: 36px; border-radius: 50%;
            border: 2px solid var(--primary); background: white;
            font-size: 18px; font-weight: bold; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s;
        }
        .passenger-counter button:hover { background: var(--primary); }
        .passenger-counter button:disabled { border-color: #ddd; color: #ccc; cursor: not-allowed; }
        .passenger-counter .count { font-size: 20px; font-weight: bold; min-width: 30px; text-align: center; }
        
        /* Suggested Price Display */
        .suggested-price-card {
            background: linear-gradient(135deg, #f9d71c, #f5c800);
            border-radius: 12px; padding: 15px; margin-bottom: 12px;
            display: none;
        }
        .suggested-price-card.active { display: block; }
        .suggested-price-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .suggested-price-header .title { font-size: 12px; font-weight: 600; color: #333; }
        .suggested-price-value { font-size: 28px; font-weight: bold; color: #000; }
        .suggested-price-breakdown { display: flex; gap: 15px; margin-top: 10px; font-size: 11px; color: #333; }
        .breakdown-item { display: flex; flex-direction: column; }
        .breakdown-item .label { color: #555; }
        .breakdown-item .value { font-weight: 600; }
        .cash-note {
            background: #fff; padding: 10px; border-radius: 8px;
            margin-top: 10px; text-align: center; font-size: 12px;
            font-weight: 600; color: #333;
        }
        
        /* Buttons */
        .btn { padding: 14px 20px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; transition: all 0.2s; }
        .btn-primary { background: var(--dark); color: var(--primary); }
        .btn-success { background: var(--success); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .btn:disabled { background: #ccc; color: #888; cursor: not-allowed; }
        
        /* Trip Tracker */
        .trip-tracker { display: none; background: white; border-top: 3px solid var(--success); padding: 15px; }
        .trip-tracker.active { display: block; }
        .trip-status { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
        .trip-status .status-dot {
            width: 12px; height: 12px; background: var(--success);
            border-radius: 50%; animation: pulse-dot 1.5s infinite;
        }
        @keyframes pulse-dot { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }
        .trip-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .trip-info-item { background: #f8f8f8; padding: 10px; border-radius: 8px; text-align: center; }
        .trip-info-item .label { font-size: 11px; color: var(--gray); }
        .trip-info-item .value { font-size: 16px; font-weight: 600; }
        
        /* Status Messages */
        .status-display { display: none; padding: 12px 15px; margin: 10px 0; border-radius: 10px; font-size: 14px; font-weight: 500; text-align: center; }
        .status-display.pending { background: #fff3cd; color: #856404; }
        .status-display.success { background: #d4edda; color: #155724; }
        .status-display.danger { background: #f8d7da; color: #721c24; }
        
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚗 SwiftDeal</h1>
            <div class="online-drivers-badge">
                <span class="dot"></span>
                <span id="onlineCount">0</span> online
            </div>
        </div>

        <div class="map-container">
            <div id="map"></div>
            <div class="currency-badge" id="currencyBadge">JMD</div>
            <div class="drivers-nearby-badge">
                <span id="nearbyCount">0</span> drivers nearby
            </div>
            <button class="map-btn" onclick="centerMap()">📍</button>
        </div>

        <div class="form-section" id="bookingSection">
            <div class="input-group">
                <label>📍 Pickup Location</label>
                <div class="location-input-wrapper">
                    <input type="text" id="pickupInput" placeholder="Enter pickup address">
                    <button class="use-location-btn" id="useLocationBtn" type="button">📍</button>
                </div>
            </div>

            <div class="input-group">
                <label>🎯 Drop-off Location</label>
                <input type="text" id="dropoffInput" placeholder="Enter destination">
            </div>

            <div class="passenger-selector">
                <span class="label">👥 Passengers</span>
                <div class="passenger-counter">
                    <button id="decreaseBtn" type="button">−</button>
                    <span class="count" id="passengerCount">1</span>
                    <button id="increaseBtn" type="button">+</button>
                </div>
            </div>

            <div class="suggested-price-card" id="priceCard">
                <div class="suggested-price-header">
                    <span class="title">Suggested Fare</span>
                </div>
                <div class="suggested-price-value" id="fareValue">---</div>
                <div class="suggested-price-breakdown">
                    <div class="breakdown-item">
                        <span class="label">Distance</span>
                        <span class="value" id="distanceValue">--</span>
                    </div>
                    <div class="breakdown-item">
                        <span class="label">Est. Time</span>
                        <span class="value" id="timeValue">--</span>
                    </div>
                </div>
                <div class="cash-note">💵 Pay driver in cash upon arrival</div>
            </div>

            <div id="statusMessage" class="status-display"></div>

            <button class="btn btn-primary" id="requestBtn" type="button">🚗 Request Ride</button>
        </div>

        <div class="trip-tracker" id="tripTracker">
            <div class="trip-status">
                <div class="status-dot"></div>
                <strong>Driver on the way</strong>
            </div>
            <div class="trip-info">
                <div class="trip-info-item">
                    <div class="label">Driver</div>
                    <div class="value" id="driverName">---</div>
                </div>
                <div class="trip-info-item">
                    <div class="label">Vehicle</div>
                    <div class="value" id="vehicleInfo">---</div>
                </div>
                <div class="trip-info-item">
                    <div class="label">Fare</div>
                    <div class="value" id="tripFare">---</div>
                </div>
                <div class="trip-info-item">
                    <div class="label">Payment</div>
                    <div class="value">💵 Cash</div>
                </div>
            </div>
            <button class="btn btn-success" onclick="shareTrip()" style="margin-top: 12px;">📤 Share Trip</button>
            <button class="btn btn-danger" onclick="cancelTrip()" style="margin-top: 8px;">❌ Cancel Trip</button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDbiSK1z3Kr5TM34lt2XYnPSY5b1xIBa5c",
            authDomain: "swiftdeal-3cee9.firebaseapp.com",
            databaseURL: "https://swiftdeal-3cee9-default-rtdb.firebaseio.com",
            projectId: "swiftdeal-3cee9",
            storageBucket: "swiftdeal-3cee9.firebasestorage.app",
            messagingSenderId: "626252184385",
            appId: "1:626252184385:android:bfa34b0056197eddf43fc0"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        let userCountry = 'JM', userCurrency = 'JMD', userCurrencySymbol = '$', exchangeRate = 1;
        let map, pickupMarker, dropoffMarker, routeLine;
        let pickupCoords = null, dropoffCoords = null, passengerCount = 1;
        let currentTripId = null, onlineDriversCount = 0;
        let calculatedDistance = 0, calculatedTime = 0;

        const currencyMap = {
            'US': { code: 'USD', symbol: '$' }, 'CA': { code: 'CAD', symbol: 'CA$' }, 'GB': { code: 'GBP', symbol: '£' },
            'EU': { code: 'EUR', symbol: '€' }, 'AU': { code: 'AUD', symbol: 'A$' }, 'JM': { code: 'JMD', symbol: '$' },
            'TT': { code: 'TTD', symbol: 'TT$' }, 'BB': { code: 'BBD', symbol: 'Bds$' }, 'IN': { code: 'INR', symbol: '₹' },
            'CN': { code: 'CNY', symbol: '¥' }, 'JP': { code: 'JPY', symbol: '¥' }, 'MX': { code: 'MXN', symbol: 'Mex$' },
            'BR': { code: 'BRL', symbol: 'R$' }, 'ZA': { code: 'ZAR', symbol: 'R' }, 'NG': { code: 'NGN', symbol: '₦' }
        };

        const BASELINE = { base: 250, perKm: 75, perMin: 10 };

        document.addEventListener('DOMContentLoaded', function() {
            initMap();
            detectLocation();
            setupEventListeners();
            checkActiveTrip();
            monitorOnlineDrivers();
        });

        function initMap() {
            try {
                map = L.map('map', { zoomControl: true }).setView([18.0179, -76.8099], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap', maxZoom: 19
                }).addTo(map);
                setTimeout(() => map.invalidateSize(), 100);
            } catch (error) {
                console.error('Map error:', error);
            }
        }

        async function detectLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    const { latitude, longitude } = position.coords;
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${latitude}&lon=${longitude}&format=json`);
                        const data = await response.json();
                        userCountry = data.address.country_code?.toUpperCase() || 'JM';
                        const currencyInfo = currencyMap[userCountry] || { code: 'JMD', symbol: '$' };
                        userCurrency = currencyInfo.code;
                        userCurrencySymbol = currencyInfo.symbol;
                        await fetchExchangeRate();
                        document.getElementById('currencyBadge').textContent = userCurrency;
                        if (map) map.setView([latitude, longitude], 13);
                    } catch (error) {
                        userCurrency = 'JMD'; userCurrencySymbol = '$'; exchangeRate = 1;
                    }
                }, () => { userCurrency = 'JMD'; userCurrencySymbol = '$'; exchangeRate = 1; });
            }
        }

        async function fetchExchangeRate() {
            if (userCurrency === 'JMD') { exchangeRate = 1; return; }
            try {
                const response = await fetch(`https://api.exchangerate-api.com/v4/latest/JMD`);
                const data = await response.json();
                exchangeRate = data.rates[userCurrency] || 1;
            } catch (error) {
                exchangeRate = 1;
            }
        }

        function setupEventListeners() {
            document.getElementById('useLocationBtn').addEventListener('click', useCurrentLocation);
            document.getElementById('pickupInput').addEventListener('change', async (e) => {
                const coords = await geocodeAddress(e.target.value);
                if (coords) { pickupCoords = coords; updatePickupMarker(); if (dropoffCoords) calculateRoute(); }
            });
            document.getElementById('dropoffInput').addEventListener('change', async (e) => {
                const coords = await geocodeAddress(e.target.value);
                if (coords) { dropoffCoords = coords; updateDropoffMarker(); if (pickupCoords) calculateRoute(); }
            });
            document.getElementById('decreaseBtn').addEventListener('click', () => {
                if (passengerCount > 1) { passengerCount--; document.getElementById('passengerCount').textContent = passengerCount; updatePassengerButtons(); }
            });
            document.getElementById('increaseBtn').addEventListener('click', () => {
                if (passengerCount < 7) { passengerCount++; document.getElementById('passengerCount').textContent = passengerCount; updatePassengerButtons(); }
            });
            document.getElementById('requestBtn').addEventListener('click', requestRide);
            updatePassengerButtons();
        }

        function updatePassengerButtons() {
            document.getElementById('decreaseBtn').disabled = passengerCount <= 1;
            document.getElementById('increaseBtn').disabled = passengerCount >= 7;
        }

        async function useCurrentLocation() {
            const btn = document.getElementById('useLocationBtn');
            btn.classList.add('loading'); btn.disabled = true;
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(async (position) => {
                    pickupCoords = { lat: position.coords.latitude, lng: position.coords.longitude };
                    try {
                        const response = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${pickupCoords.lat}&lon=${pickupCoords.lng}&format=json`);
                        const data = await response.json();
                        document.getElementById('pickupInput').value = data.display_name;
                    } catch (error) {
                        document.getElementById('pickupInput').value = 'Current Location';
                    }
                    updatePickupMarker();
                    if (map) map.setView([pickupCoords.lat, pickupCoords.lng], 14);
                    if (dropoffCoords) calculateRoute();
                    btn.classList.remove('loading'); btn.disabled = false;
                }, () => { alert('Unable to get location'); btn.classList.remove('loading'); btn.disabled = false; });
            }
        }

        async function geocodeAddress(address) {
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(address)}&format=json&limit=1`);
                const data = await response.json();
                if (data.length > 0) return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
            } catch (error) {}
            return null;
        }

        function updatePickupMarker() {
            if (!map) return;
            if (pickupMarker) map.removeLayer(pickupMarker);
            pickupMarker = L.marker([pickupCoords.lat, pickupCoords.lng]).addTo(map).bindPopup('📍 Pickup');
        }

        function updateDropoffMarker() {
            if (!map) return;
            if (dropoffMarker) map.removeLayer(dropoffMarker);
            dropoffMarker = L.marker([dropoffCoords.lat, dropoffCoords.lng]).addTo(map).bindPopup('🎯 Dropoff');
        }

        async function calculateRoute() {
            if (!pickupCoords || !dropoffCoords) return;
            try {
                const response = await fetch(`https://router.project-osrm.org/route/v1/driving/${pickupCoords.lng},${pickupCoords.lat};${dropoffCoords.lng},${dropoffCoords.lat}?overview=full&geometries=geojson`);
                const data = await response.json();
                if (data.routes && data.routes.length > 0) {
                    const route = data.routes[0];
                    calculatedDistance = route.distance / 1000;
                    calculatedTime = route.duration / 60;
                    if (routeLine && map) map.removeLayer(routeLine);
                    const coordinates = route.geometry.coordinates.map(coord => [coord[1], coord[0]]);
                    routeLine = L.polyline(coordinates, { color: '#f9d71c', weight: 4 }).addTo(map);
                    map.fitBounds(routeLine.getBounds());
                    calculateFare(calculatedDistance, calculatedTime);
                }
            } catch (error) {
                showStatus('Unable to calculate route', 'danger');
            }
        }

        function calculateFare(distanceKm, durationMin) {
            const fareJMD = BASELINE.base + (BASELINE.perKm * distanceKm) + (BASELINE.perMin * durationMin);
            const fareLocal = fareJMD * exchangeRate;
            document.getElementById('priceCard').classList.add('active');
            document.getElementById('fareValue').textContent = `${userCurrencySymbol}${fareLocal.toFixed(2)}`;
            document.getElementById('distanceValue').textContent = `${distanceKm.toFixed(2)} km`;
            document.getElementById('timeValue').textContent = `${Math.round(durationMin)} min`;
        }

        async function requestRide() {
            if (!pickupCoords || !dropoffCoords) { showStatus('Please set both locations', 'danger'); return; }
            if (onlineDriversCount === 0) { showStatus('No drivers available', 'danger'); return; }
            const rideData = {
                passengerId: generateId('PASS'), pickupLat: pickupCoords.lat, pickupLng: pickupCoords.lng,
                dropoffLat: dropoffCoords.lat, dropoffLng: dropoffCoords.lng,
                pickupAddress: document.getElementById('pickupInput').value,
                dropoffAddress: document.getElementById('dropoffInput').value,
                passengerCount, distance: calculatedDistance, estimatedTime: calculatedTime,
                suggestedFare: document.getElementById('fareValue').textContent,
                currency: userCurrency, country: userCountry,
                status: 'pending', timestamp: Date.now(), driverId: null
            };
            try {
                const rideRef = database.ref('rides').push();
                currentTripId = rideRef.key;
                await rideRef.set(rideData);
                localStorage.setItem('activeTrip', currentTripId);
                showStatus('🚗 Looking for drivers...', 'pending');
                rideRef.on('value', (snapshot) => {
                    const ride = snapshot.val();
                    if (ride && ride.status === 'accepted' && ride.driverId) showTrackingView(ride);
                    else if (ride && ride.status === 'completed') { showStatus('✅ Trip completed!', 'success'); setTimeout(() => location.reload(), 3000); }
                    else if (ride && ride.status === 'cancelled') { showStatus('Trip cancelled', 'danger'); setTimeout(() => location.reload(), 3000); }
                });
            } catch (error) {
                showStatus('Failed to request ride', 'danger');
            }
        }

        function showTrackingView(ride) {
            document.getElementById('bookingSection').style.display = 'none';
            document.getElementById('tripTracker').classList.add('active');
            database.ref(`drivers/${ride.driverId}`).once('value', (snapshot) => {
                const driver = snapshot.val();
                if (driver) {
                    document.getElementById('driverName').textContent = driver.name;
                    document.getElementById('vehicleInfo').textContent = `${driver.vehicleMake} ${driver.vehicleModel}`;
                }
            });
            document.getElementById('tripFare').textContent = ride.suggestedFare;
        }

        function shareTrip() {
            if (currentTripId) {
                const url = `https://swiftdeal-3cee9.firebaseapp.com/track.html?trip=${currentTripId}`;
                if (navigator.share) navigator.share({ title: 'Track My Trip', url });
                else { navigator.clipboard.writeText(url); showStatus('Link copied!', 'success'); }
            }
        }

        async function cancelTrip() {
            if (confirm('Cancel this trip?')) {
                await database.ref(`rides/${currentTripId}`).update({ status: 'cancelled', cancelledBy: 'passenger', cancelledAt: Date.now() });
                localStorage.removeItem('activeTrip');
                location.reload();
            }
        }

        function checkActiveTrip() {
            const activeTrip = localStorage.getItem('activeTrip');
            if (activeTrip) {
                currentTripId = activeTrip;
                database.ref(`rides/${activeTrip}`).once('value', (snapshot) => {
                    const ride = snapshot.val();
                    if (ride && ride.status !== 'completed' && ride.status !== 'cancelled') {
                        if (ride.status === 'accepted' && ride.driverId) showTrackingView(ride);
                    } else {
                        localStorage.removeItem('activeTrip');
                    }
                });
            }
        }

        function monitorOnlineDrivers() {
            database.ref('drivers').on('value', (snapshot) => {
                const drivers = snapshot.val();
                if (drivers) {
                    onlineDriversCount = Object.values(drivers).filter(d => d.isOnline && d.status === 'approved' && d.subscriptionStatus === 'active').length;
                    document.getElementById('onlineCount').textContent = onlineDriversCount;
                    document.getElementById('nearbyCount').textContent = onlineDriversCount;
                }
            });
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusMessage');
            statusDiv.className = `status-display ${type}`;
            statusDiv.textContent = message;
            statusDiv.style.display = 'block';
            if (type === 'success' || type === 'danger') setTimeout(() => statusDiv.style.display = 'none', 5000);
        }

        function centerMap() {
            if (pickupCoords && map) map.setView([pickupCoords.lat, pickupCoords.lng], 14);
        }

        function generateId(prefix) {
            return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
        }
    </script>
</body>
</html>
