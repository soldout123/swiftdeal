<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwiftDeal — Offline</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Plus Jakarta Sans',system-ui,sans-serif;background:#000;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:20px}
        .container{max-width:360px}
        h1{font-size:28px;margin-bottom:12px}
        .icon{font-size:64px;margin-bottom:20px}
        p{color:#888;font-size:14px;line-height:1.6;margin-bottom:24px}
        button{padding:14px 32px;background:#c8ff00;color:#000;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📡</div>
        <h1>You're Offline</h1>
        <p>SwiftDeal needs an internet connection to book rides and connect with drivers. Please check your connection and try again.</p>
        <button onclick="location.reload()">Try Again</button>
    </div>
</body>
</html>
