name: Build iOS App

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install the Apple Certificate and Provisioning Profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Install CocoaPods
        run: |
          cd SwiftDeal_iOS_Source/src
          pod install

      - name: Configure Main App Signing & Build
        run: |
          cd SwiftDeal_iOS_Source/src
          
          WORKSPACE=$(ls -d *.xcworkspace | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          PROJECT=$(ls -d *.xcodeproj | head -1)
          
          # Inject signing silently into the main project file
          cat << RUBY_EOF > configure_signing.rb
          require 'xcodeproj'
          project = Xcodeproj::Project.open("#{ARGV[0]}")
          project.targets.each do |target|
            target.build_configurations.each do |config|
              config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
              config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = 'SwiftDeal App Store Profile'
              config.build_settings['CODE_SIGN_IDENTITY'] = 'Apple Distribution'
              config.build_settings['DEVELOPMENT_TEAM'] = '8R8TRHFW7B'
              config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'com.swiftdeal.app'
            end
          end
          project.save
          RUBY_EOF
          
          ruby configure_signing.rb "$PROJECT"
          
          echo "Building Workspace: $WORKSPACE"
          
          # Run a clean build with NO screaming command line overrides
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -destination "generic/platform=iOS" \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive

      - name: Export IPA
        run: |
          cd SwiftDeal_iOS_Source/src
          
          # Using the updated 'app-store-connect' method
          cat << 'PLIST_EOF' > exportOptions.plist
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store-connect</string>
              <key>teamID</key>
              <string>8R8TRHFW7B</string>
              <key>provisioningProfiles</key>
              <dict>
                  <key>com.swiftdeal.app</key>
                  <string>SwiftDeal App Store Profile</string>
              </dict>
              <key>signingCertificate</key>
              <string>Apple Distribution</string>
              <key>signingStyle</key>
              <string>manual</string>
              <key>stripSwiftSymbols</key>
              <true/>
          </dict>
          </plist>
          PLIST_EOF
          
          xcodebuild -exportArchive \
            -archivePath $PWD/build/App.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath $PWD/build/export

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDeal-iOS-Release
          path: SwiftDeal_iOS_Source/src/build/export/*.ipa
