name: Build SwiftDeal AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK Licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Bubblewrap CLI
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap to use installed JDK and SDK
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "Bubblewrap config:"
          cat ~/.bubblewrap/config.json

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/signing.keystore
          ls -la $HOME/signing.keystore

      - name: Initialize Bubblewrap Project
        run: |
          mkdir -p $HOME/twa-build && cd $HOME/twa-build
          yes "" | bubblewrap init --manifest="https://swiftdeal-3cee9.web.app/manifest.json" 2>&1 || true
          echo "=== Files generated ==="
          ls -la

      - name: Fix TWA Manifest Settings
        run: |
          cd $HOME/twa-build
          sudo apt-get install -y jq > /dev/null 2>&1
          TEMP_FILE=$(mktemp)
          jq --arg home "$HOME" --arg alias "$KEY_ALIAS" '
            .packageId = "com.swiftdeal.app" |
            .display = "standalone" |
            .orientation = "portrait" |
            .appVersion = "9.0.0.0" |
            .appVersionCode = 9 |
            .features.locationDelegation.enabled = true |
            .enableNotifications = true |
            .signingKey.path = ($home + "/signing.keystore") |
            .signingKey.alias = $alias |
            .themeColor = "#f9d71c" |
            .navigationColor = "#000000" |
            .backgroundColor = "#000000"
          ' twa-manifest.json > "$TEMP_FILE" && mv "$TEMP_FILE" twa-manifest.json
          echo "=== Updated twa-manifest.json ==="
          cat twa-manifest.json
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Regenerate Project with Updated Settings
        run: |
          cd $HOME/twa-build
          yes "" | bubblewrap update --skipVersionUpgrade 2>&1 || true

      - name: Build AAB
        run: |
          cd $HOME/twa-build
          bubblewrap build --skipPwaValidation --signingKeyPath="$HOME/signing.keystore" --signingKeyAlias="${{ secrets.KEY_ALIAS }}"
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect AAB
        run: |
          AAB=$(find $HOME/twa-build -name "*.aab" -type f 2>/dev/null | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" $GITHUB_WORKSPACE/SwiftDeal-v9.aab
            echo "AAB ready: $(ls -lh $GITHUB_WORKSPACE/SwiftDeal-v9.aab)"
          else
            echo "No AAB found. Directory contents:"
            ls -laR $HOME/twa-build/ | head -80
            exit 1
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDeal-v9-AAB
          path: SwiftDeal-v9.aab
          retention-days: 30
