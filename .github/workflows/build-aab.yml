name: Build SwiftDeal AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/signing.keystore
          ls -la $HOME/signing.keystore

      - name: Install Gradle
        run: |
          curl -sL "https://services.gradle.org/distributions/gradle-8.5-bin.zip" -o /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt
          echo "/opt/gradle-8.5/bin" >> $GITHUB_PATH
          export PATH="/opt/gradle-8.5/bin:$PATH"
          gradle --version

      - name: Create TWA Project
        run: |
          PRJ=$HOME/twa
          mkdir -p $PRJ/app/src/main/res/values
          mkdir -p $PRJ/app/src/main/res/mipmap-xxxhdpi

          curl -sL "https://swiftdeal-3cee9.web.app/icons/icon-512x512.png" \
            -o $PRJ/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Write Root build.gradle
        run: |
          cat > $HOME/twa/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
             dependencies {
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          } 
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

      - name: Write settings.gradle
        run: echo "include ':app'" > $HOME/twa/settings.gradle

      - name: Write gradle.properties
        run: |
          cat > $HOME/twa/gradle.properties << 'EOF'
          android.useAndroidX=true
          org.gradle.jvmargs=-Xmx2048m
          EOF

      - name: Write App build.gradle
        run: |
          cat > $HOME/twa/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              namespace "com.swiftdeal.app"
              compileSdk 34
              defaultConfig {
                  applicationId "com.swiftdeal.app"
                  minSdk 19
                  targetSdk 34
                  versionCode 9
                  versionName "9.0.0.0"
              }
              signingConfigs {
                  release {
                      storeFile file(System.getenv("KEYSTORE_PATH"))
                      storePassword System.getenv("KEYSTORE_PASSWORD")
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled false
                  }
              }
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

      - name: Write AndroidManifest.xml
        run: |
          cat > $HOME/twa/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION"/>
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION"/>
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="@string/app_name"
                  android:theme="@style/AppTheme"
                  android:supportsRtl="true">
                  <meta-data
                      android:name="asset_statements"
                      android:resource="@string/asset_statements"/>
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true"
                      android:screenOrientation="portrait">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://swiftdeal-3cee9.web.app"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.STATUS_BAR_COLOR"
                          android:value="#FF000000"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.NAVIGATION_BAR_COLOR"
                          android:value="#FF000000"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_IMAGE_DRAWABLE"
                          android:resource="@mipmap/ic_launcher"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.SPLASH_SCREEN_BACKGROUND_COLOR"
                          android:value="#FF000000"/>
                      <meta-data
                          android:name="android.support.customtabs.trusted.DISPLAY_MODE"
                          android:value="standalone"/>
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN"/>
                          <category android:name="android.intent.category.LAUNCHER"/>
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https" android:host="swiftdeal-3cee9.web.app"/>
                      </intent-filter>
                  </activity>
                  <activity android:name="com.google.androidbrowserhelper.trusted.FocusActivity"/>
                  <service
                      android:name="com.google.androidbrowserhelper.trusted.DelegationService"
                      android:enabled="true"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.support.customtabs.trusted.TRUSTED_WEB_ACTIVITY_SERVICE"/>
                          <category android:name="android.intent.category.DEFAULT"/>
                      </intent-filter>
                  </service>
              </application>
              <queries>
                  <intent>
                      <action android:name="android.support.customtabs.action.CustomTabsService"/>
                  </intent>
              </queries>
          </manifest>
          EOF

      - name: Write Resource Files
        run: |
          cat > $HOME/twa/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">SwiftDeal</string>
              <string name="asset_statements">[{\"relation\": [\"delegate_permission/common.handle_all_urls\"], \"target\": {\"namespace\": \"web\", \"site\": \"https://swiftdeal-3cee9.web.app\"}}]</string>
          </resources>
          EOF

          cat > $HOME/twa/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="colorPrimary">#FFF9D71C</color>
              <color name="colorPrimaryDark">#FF000000</color>
              <color name="backgroundColor">#FF000000</color>
          </resources>
          EOF

          cat > $HOME/twa/app/src/main/res/values/styles.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <style name="AppTheme" parent="Theme.AppCompat.NoActionBar">
                  <item name="colorPrimary">@color/colorPrimary</item>
                  <item name="colorPrimaryDark">@color/colorPrimaryDark</item>
                  <item name="android:windowBackground">@color/backgroundColor</item>
              </style>
          </resources>
          EOF

      - name: Validate XML
        run: |
          echo "=== AndroidManifest.xml ==="
          cat $HOME/twa/app/src/main/AndroidManifest.xml
          echo ""
          echo "=== Validating XML ==="
          python3 -c "
          import xml.etree.ElementTree as ET
          ET.parse('$HOME/twa/app/src/main/AndroidManifest.xml')
          print('AndroidManifest.xml: VALID')
          ET.parse('$HOME/twa/app/src/main/res/values/strings.xml')
          print('strings.xml: VALID')
          ET.parse('$HOME/twa/app/src/main/res/values/colors.xml')
          print('colors.xml: VALID')
          ET.parse('$HOME/twa/app/src/main/res/values/styles.xml')
          print('styles.xml: VALID')
          "

      - name: Build AAB
        run: |
          cd $HOME/twa
          gradle bundleRelease --no-daemon
        env:
          KEYSTORE_PATH: /home/runner/signing.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Collect AAB
        run: |
          AAB=$(find $HOME/twa -name "*.aab" -type f | head -1)
          if [ -n "$AAB" ]; then
            cp "$AAB" $GITHUB_WORKSPACE/SwiftDeal-v9.aab
            echo "SUCCESS: $(ls -lh $GITHUB_WORKSPACE/SwiftDeal-v9.aab)"
          else
            echo "ERROR: No AAB found"
            exit 1
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDeal-v9-AAB
          path: SwiftDeal-v9.aab
          retention-days: 30
