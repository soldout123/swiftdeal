name: Build SwiftDeal AAB

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > $HOME/signing.keystore
          echo "Keystore decoded successfully"
          ls -la $HOME/signing.keystore

      - name: Initialize Bubblewrap Project
        run: |
          mkdir -p $HOME/swiftdeal-twa && cd $HOME/swiftdeal-twa

          # Create twa-manifest.json directly to skip interactive prompts
          cat > twa-manifest.json << 'MANIFEST'
          {
            "packageId": "com.swiftdeal.app",
            "host": "swiftdeal-3cee9.web.app",
            "name": "SwiftDeal - AI Smart Rides",
            "launcherName": "SwiftDeal",
            "display": "standalone",
            "themeColor": "#f9d71c",
            "themeColorDark": "#000000",
            "navigationColor": "#000000",
            "navigationColorDark": "#000000",
            "navigationDividerColor": "#000000",
            "navigationDividerColorDark": "#000000",
            "backgroundColor": "#000000",
            "enableNotifications": true,
            "startUrl": "/index.html",
            "iconUrl": "https://swiftdeal-3cee9.web.app/icons/icon-512x512.png",
            "maskableIconUrl": "https://swiftdeal-3cee9.web.app/icons/icon-512x512.png",
            "monochromeIconUrl": "https://swiftdeal-3cee9.web.app/icons/icon-512x512.png",
            "shortcuts": [],
            "signingKey": {
              "path": "$HOME_PLACEHOLDER/signing.keystore",
              "alias": "$KEY_ALIAS_PLACEHOLDER"
            },
            "appVersionCode": 9,
            "appVersion": "9.0.0.0",
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://swiftdeal-3cee9.web.app/manifest.json",
            "fallbackType": "customtabs",
            "features": {
              "locationDelegation": {
                "enabled": true
              },
              "playBilling": {
                "enabled": false
              }
            },
            "alphaDependencies": {
              "enabled": false
            },
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://swiftdeal-3cee9.web.app/",
            "minSdkVersion": 19,
            "orientation": "portrait",
            "fingerprints": []
          }
          MANIFEST

          # Replace placeholders with actual values
          sed -i "s|\$HOME_PLACEHOLDER|$HOME|g" twa-manifest.json
          sed -i "s|\$KEY_ALIAS_PLACEHOLDER|${{ secrets.KEY_ALIAS }}|g" twa-manifest.json

          echo "twa-manifest.json created:"
          cat twa-manifest.json
        working-directory: ${{ github.workspace }}

      - name: Build with Bubblewrap
        run: |
          cd $HOME/swiftdeal-twa || true
          cp ${{ github.workspace }}/twa-manifest.json . 2>/dev/null || true

          # Let Bubblewrap install Android SDK
          echo "y" | bubblewrap build \
            --skipPwaValidation \
            --signingKeyPath="$HOME/signing.keystore" \
            --signingKeyAlias="${{ secrets.KEY_ALIAS }}" \
            --manifest="."
        working-directory: ${{ github.workspace }}
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Find and copy AAB
        run: |
          echo "Looking for AAB files..."
          find $HOME -name "*.aab" -type f 2>/dev/null
          find . -name "*.aab" -type f 2>/dev/null

          # Copy AAB to workspace
          AAB_FILE=$(find . $HOME -name "*.aab" -type f 2>/dev/null | head -1)
          if [ -n "$AAB_FILE" ]; then
            cp "$AAB_FILE" ${{ github.workspace }}/SwiftDeal-v9.aab
            echo "AAB found and copied: $AAB_FILE"
            ls -la ${{ github.workspace }}/SwiftDeal-v9.aab
          else
            echo "ERROR: No AAB file found!"
            exit 1
          fi

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDeal-v9-AAB
          path: SwiftDeal-v9.aab
          retention-days: 30
