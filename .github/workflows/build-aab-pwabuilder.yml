name: Build SwiftDeal AAB (PWABuilder Source)

# Builds the PWABuilder-generated TWA source from /twa-source/ with these fixes:
#   - minSdk lowered from 23 → 21 (recovers ~1,000 dropped devices)
#   - Play Billing helper library removed (fixes "Play Billing" launcher name)
#   - PaymentActivity / PaymentService removed from AndroidManifest.xml
#
# Uses these existing repo secrets:
#   KEYSTORE_BASE64    — base64-encoded keystore file
#   KEYSTORE_PASSWORD  — store password
#   KEY_ALIAS          — key alias inside the keystore
#   KEY_PASSWORD       — key password

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept SDK Licenses
        run: yes | sdkmanager --licenses > /dev/null 2>&1 || true

      - name: Install Required SDK Components
        run: |
          sdkmanager "build-tools;34.0.0" "platforms;android-35" "platforms;android-36" || true

      - name: Verify TWA Source Exists
        run: |
          if [ ! -d "twa-source" ]; then
            echo "ERROR: twa-source/ folder not found in repo root"
            echo "Please commit the modified PWABuilder source to twa-source/"
            exit 1
          fi
          echo "=== twa-source contents ==="
          ls -la twa-source/

      - name: Auto-Bump Version Code
        run: |
          NEW_CODE=$((130 + ${{ github.run_number }}))
          NEW_NAME="9.0.${NEW_CODE}"
          echo "Setting versionCode=$NEW_CODE versionName=$NEW_NAME"
          sed -i "s/versionCode [0-9]*/versionCode $NEW_CODE/" twa-source/app/build.gradle
          sed -i "s/versionName \"[^\"]*\"/versionName \"$NEW_NAME\"/" twa-source/app/build.gradle
          grep -E "versionCode|versionName" twa-source/app/build.gradle

      - name: Verify Build Config
        run: |
          echo "=== build.gradle check ==="
          grep -E "minSdkVersion|targetSdkVersion|versionCode|versionName" twa-source/app/build.gradle
          echo ""
          echo "=== Should show NO billing dependency ==="
          grep -i "billing" twa-source/app/build.gradle && echo "WARNING: billing still in gradle" || echo "Clean"
          echo ""
          echo "=== Manifest billing check (should be empty) ==="
          grep -i "playbilling\|PaymentActivity\|PaymentService" twa-source/app/src/main/AndroidManifest.xml && echo "WARNING: billing still in manifest" || echo "Clean"

      - name: Decode Keystore from Secret
        run: |
          mkdir -p twa-source/keystore-tmp
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > twa-source/keystore-tmp/release.keystore
          ls -la twa-source/keystore-tmp/release.keystore
          keytool -list -keystore twa-source/keystore-tmp/release.keystore \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" 2>&1 | head -5 || echo "Keystore read failed"

      - name: Make Gradlew Executable
        run: chmod +x twa-source/gradlew

      - name: Build Release AAB
        working-directory: twa-source
        run: ./gradlew bundleRelease --no-daemon --stacktrace

      - name: Locate Built AAB
        id: locate
        run: |
          AAB=$(find twa-source/app/build/outputs/bundle -name "*.aab" | head -1)
          if [ -z "$AAB" ]; then
            echo "ERROR: No AAB found"
            find twa-source/app/build -type f \( -name "*.aab" -o -name "*.apk" \) 2>/dev/null
            exit 1
          fi
          echo "Found AAB: $AAB"
          echo "aab_path=$AAB" >> $GITHUB_OUTPUT
          ls -la "$AAB"

      - name: Sign AAB with jarsigner
  run: |
    cp twa-source/app/build/outputs/bundle/release/app-release.aab SwiftDeal-signed.aab
    jarsigner -verbose -sigalg SHA256withRSA -digestalg SHA-256 -keystore signing.keystore -storepass android -keypass android SwiftDeal-signed.aab android
    

      - name: Verify Final AAB
        run: |
          AAB="$GITHUB_WORKSPACE/SwiftDeal-signed.aab"
          echo "=== AAB billing check (should be empty) ==="
          unzip -l "$AAB" | grep -i "billing\|payment" && echo "WARNING: billing files in AAB" || echo "Clean — no billing files"
          echo ""
          echo "=== Final size ==="
          ls -lh "$AAB"

      - name: Cleanup Keystore
        if: always()
        run: rm -rf twa-source/keystore-tmp

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SwiftDeal-AAB
          path: SwiftDeal-signed.aab
          retention-days: 30
